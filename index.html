<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MMS">
  <meta name="theme-color" content="#3b82f6">
  <title>Meter Management System</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060d1a;
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #loadingScreen {
      position: fixed;
      inset: 0;
      background: #060d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    #loadingScreen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(59,130,246,0.4);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(59,130,246,0.4); }
      50%       { box-shadow: 0 8px 48px rgba(59,130,246,0.7); }
    }

    h1 {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      color: #f1f5f9;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .sub {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.7rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 32px;
    }

    .progress-wrap {
      width: 200px;
      height: 3px;
      background: #0a1628;
      border-radius: 100px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .progress-bar {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #3b82f6, #6366f1);
      animation: progress 2s ease forwards;
    }

    @keyframes progress {
      0%   { width: 0%; }
      50%  { width: 70%; }
      80%  { width: 90%; }
      100% { width: 100%; }
    }

    .status {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.72rem;
      color: #60a5fa;
    }

    #appFrame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      z-index: 1;
    }

    #installBtn {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #0f1e33;
      border: 1px solid #3b82f6;
      border-radius: 14px;
      padding: 12px 20px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      color: #60a5fa;
      cursor: pointer;
      z-index: 99999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      animation: slideUp 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    #installBtn.visible { display: flex; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    #iosHint {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      background: #0f1e33;
      border-top: 2px solid #3b82f6;
      padding: 16px 20px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.76rem;
      color: #94a3b8;
      line-height: 1.6;
      z-index: 99999;
      text-align: center;
    }

    #iosHint.visible { display: block; }

    #iosHintClose {
      position: absolute;
      top: 10px; right: 14px;
      background: none;
      border: none;
      color: #475569;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Handle update redirect FIRST before anything renders -->
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      if (params.get('from_update') === '1') {
        const redirectBack    = localStorage.getItem('mms_redirect_back');
        const redirectSession = localStorage.getItem('mms_redirect_session');

        if (redirectSession && redirectSession !== 'null' && redirectSession !== '') {
          sessionStorage.setItem('mms_session', redirectSession);
        }

        localStorage.removeItem('mms_redirect_back');
        localStorage.removeItem('mms_redirect_session');

        const backUrl = redirectBack && redirectBack !== 'null'
          ? redirectBack
          : 'https://script.google.com/a/~/macros/s/AKfycbzaYOxfFzLh72UHACcokZB_aBBCPOA-kEebh4Ky8OhVJJ0DgeyhZt9FWnyiU_75NoIecA/exec';

        window.location.replace(backUrl);
      }
    })();
  </script>

  <!-- Loading screen -->
  <div id="loadingScreen">
    <div class="logo">⚡</div>
    <h1>Meter Management</h1>
    <p class="sub">DVVNL · MDM System · v2.0</p>
    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>
    <p class="status" id="statusText">Connecting to MDM servers...</p>
  </div>

  <!-- Full screen iframe — no banner appears here -->
  <iframe
    id="appFrame"
    src="https://script.google.com/a/~/macros/s/AKfycbzaYOxfFzLh72UHACcokZB_aBBCPOA-kEebh4Ky8OhVJJ0DgeyhZt9FWnyiU_75NoIecA/exec"
    allow="clipboard-read; clipboard-write"
    sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-downloads allow-modals"
  ></iframe>

  <!-- PWA Install button -->
  <button id="installBtn" onclick="installPWA()">
    📲 Install MMS App
  </button>

  <!-- iOS install hint -->
  <div id="iosHint">
    <button id="iosHintClose" onclick="closeIOSHint()">×</button>
    📱 <strong style="color:#60a5fa;">Install on iPhone:</strong>
    Tap <strong style="color:#f1f5f9;">Share ⎙</strong> then
    <strong style="color:#f1f5f9;">Add to Home Screen ➕</strong>
  </div>

  <script>
    const APP_URL    = "https://script.google.com/a/~/macros/s/AKfycbzaYOxfFzLh72UHACcokZB_aBBCPOA-kEebh4Ky8OhVJJ0DgeyhZt9FWnyiU_75NoIecA/exec";
    const loading    = document.getElementById('loadingScreen');
    const statusText = document.getElementById('statusText');
    const appFrame   = document.getElementById('appFrame');
    const installBtn = document.getElementById('installBtn');
    const iosHint    = document.getElementById('iosHint');

    // Cycle status messages while iframe loads
    const messages = [
      'Connecting to MDM servers...',
      'Verifying configuration...',
      'Loading dashboard...'
    ];
    let msgIndex = 0;
    const msgInterval = setInterval(function() {
      msgIndex = (msgIndex + 1) % messages.length;
      statusText.textContent = messages[msgIndex];
    }, 900);

    // Hide loading screen when iframe finishes loading
    appFrame.addEventListener('load', function() {
      clearInterval(msgInterval);
      statusText.textContent = 'Ready!';
      setTimeout(function() {
        loading.classList.add('fade-out');
        setTimeout(function() {
          loading.style.display = 'none';
        }, 400);
      }, 300);
    });

    // Fallback — hide loading after 8 seconds
    setTimeout(function() {
      loading.classList.add('fade-out');
      setTimeout(function() { loading.style.display = 'none'; }, 400);
    }, 8000);

    // ── PWA Install ────────────────────────────────────
    var deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(function() {
        installBtn.classList.add('visible');
        setTimeout(function() {
          installBtn.classList.remove('visible');
        }, 30000);
      }, 1);
    });

    function installPWA() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(result) {
        if (result.outcome === 'accepted') {
          installBtn.classList.remove('visible');
        }
        deferredPrompt = null;
      });
    }

    window.addEventListener('appinstalled', function() {
      installBtn.classList.remove('visible');
    });

    // iOS
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    var isStandalone = window.matchMedia('(display-mode: standalone)').matches;

    if (isIOS && isSafari && !isStandalone && !localStorage.getItem('ios_hint_dismissed')) {
      setTimeout(function() {
        iosHint.classList.add('visible');
      }, 4000);
    }

    function closeIOSHint() {
      iosHint.classList.remove('visible');
      localStorage.setItem('ios_hint_dismissed', '1');
    }

    // ── Service Worker ──────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(function(r) { console.log('[PWA] SW registered'); })
        .catch(function(e) { console.log('[PWA] SW failed:', e.message); });
    }
  </script>
</body>
</html>
